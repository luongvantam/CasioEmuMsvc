name: Auto build and pre-release

on:
  workflow_dispatch:
  push:
    branches: [ "stable" ]

env:
  BUILD_CONFIGURATION: Release

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: windows
            platform_arch: x64
            os: windows-latest
            name: "Windows-x64"
          - platform: windows
            platform_arch: x86
            os: windows-latest
            name: "Windows-x86"
          - platform: android
            os: ubuntu-latest
            name: "Android"
          - platform: mac
            os: macos-latest
            name: "macOS"
          - platform: linux
            os: ubuntu-latest
            name: "Linux-x64"
          - platform: ios
            os: macos-latest
            name: "iOS"
    
    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Setup MSVC x64
      if: matrix.platform == 'windows' && matrix.platform_arch == 'x64'
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: amd64
    
    - name: Configure x64
      if: matrix.platform == 'windows' && matrix.platform_arch == 'x64'
      run: cmake -S . -B build-x64 -G Ninja
    
    - name: Build x64
      if: matrix.platform == 'windows' && matrix.platform_arch == 'x64'
      run: cmake --build build-x64 --parallel

    - name: Upload x64 Build Artifact
      if: matrix.platform == 'windows' && matrix.platform_arch == 'x64'
      uses: actions/upload-artifact@v7
      with:
        name: Release-x64.zip
        path: |
          build-x64/CasioEmuMsvc/*.exe
          build-x64/CasioEmuMsvc/*.exp
          build-x64/CasioEmuMsvc/*.lib
          build-x64/CasioEmuMsvc/roms.db
          build-x64/CasioEmuMsvc/locales/*
        retention-days: 1

    - name: Setup MSVC x86
      if: matrix.platform == 'windows' && matrix.platform_arch == 'x86'
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x86

    - name: Configure x86
      if: matrix.platform == 'windows' && matrix.platform_arch == 'x86'
      run: cmake -S . -B build-x86 -G Ninja

    - name: Build x86
      if: matrix.platform == 'windows' && matrix.platform_arch == 'x86'
      run: cmake --build build-x86 --parallel

    # - name: Upload PDBs to Sentry
    #   if: matrix.platform == 'windows'
    #   env:
    #     SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_TOKEN }}
    #     SENTRY_ORG: "t5-j7"
    #     SENTRY_PROJECT: "native"
    #     COMMIT_HASH: ${{ github.sha }}
    #     RELEASE_TAG: "CasioEmuMsvc@${{ github.sha }}"
    #   working-directory: build/CasioEmuMsvc/${{ env.BUILD_CONFIGURATION }}
    #   run: |
    #         $sentry_cli = "${{ github.workspace }}\CasioEmuMsvc\sentry-cli.exe"
    #         & $sentry_cli debug-files upload -o $env:SENTRY_ORG -p $env:SENTRY_PROJECT .

    - name: Upload x86 Build Artifact
      if: matrix.platform == 'windows' && matrix.platform_arch == 'x86'
      uses: actions/upload-artifact@v7
      with:
        name: Release-x86.zip
        path: |
          build-x86/CasioEmuMsvc/*.exe
          build-x86/CasioEmuMsvc/*.exp
          build-x86/CasioEmuMsvc/*.lib
          build-x86/CasioEmuMsvc/roms.db
          build-x86/CasioEmuMsvc/locales/*
        retention-days: 1
    
    # ================= MACOS =================
    - name: Install dependencies (macOS)
      if: matrix.platform == 'mac'
      run: |
        brew install cmake sdl2 sdl2_image ccache ninja
    
    - name: Build icons for macOS
      if: matrix.platform == 'mac'
      run: |
        set -e
    
        ICONSET=AppIcon.iconset
        IMG=resources/new-logo.png
    
        rm -rf $ICONSET
        mkdir $ICONSET
    
        # generate iconset (macOS chuẩn size)
        sips -z 16 16     "$IMG" --out $ICONSET/icon_16x16.png
        sips -z 32 32     "$IMG" --out $ICONSET/icon_16x16@2x.png
    
        sips -z 32 32     "$IMG" --out $ICONSET/icon_32x32.png
        sips -z 64 64     "$IMG" --out $ICONSET/icon_32x32@2x.png
    
        sips -z 128 128   "$IMG" --out $ICONSET/icon_128x128.png
        sips -z 256 256   "$IMG" --out $ICONSET/icon_128x128@2x.png
    
        sips -z 256 256   "$IMG" --out $ICONSET/icon_256x256.png
        sips -z 512 512   "$IMG" --out $ICONSET/icon_256x256@2x.png
    
        sips -z 512 512   "$IMG" --out $ICONSET/icon_512x512.png
        sips -z 1024 1024 "$IMG" --out $ICONSET/icon_512x512@2x.png
    
        iconutil -c icns $ICONSET -o AppIcon.icns
        
        mkdir -p MacResources
        cp AppIcon.icns MacResources/AppIcon.icns
        
        echo "CCACHE_COMPRESS=1" >> $GITHUB_ENV
        echo "CCACHE_MAXSIZE=400M" >> $GITHUB_ENV
    
    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: mac-ccache-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}
    
    - name: Build for macOS
      if: matrix.platform == 'mac'
      env:
        MACOSX_DEPLOYMENT_TARGET: 11.0
      run: |
        cmake -S . -B build \
        -G Ninja \
        -DBUILD_EXECUTABLE=ON \
        -DCMAKE_BUILD_TYPE=Release \
        -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
        -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
        -DCMAKE_C_COMPILER_LAUNCHER=ccache \
        -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
        -DCMAKE_CXX_FLAGS="-fdiagnostics-color=always"
        
        cmake --build build --parallel 6
    
    - name: Show build tree
      if: matrix.platform == 'mac'
      run: |
        echo "---- BUILD TREE ----"
        ls -R build
    
    - name: Create DMG
      if: matrix.platform == 'mac'
      run: |
        cd build
        APP=$(find . -name "*.app" | head -n 1)
        echo "Found app: $APP"
    
        mkdir dmg
        cp -r "$APP" dmg/
        ln -s /Applications dmg/Applications
        
        hdiutil create CasioEmuMsvc.dmg \
          -volname "CasioEmuMsvc" \
          -srcfolder dmg \
          -ov \
          -format UDZO
    
    - name: Upload macOS Build Artifact
      if: matrix.platform == 'mac'
      uses: actions/upload-artifact@v7
      with:
        path: |
          build/CasioEmuMsvc.dmg
        # compression-level: 6
        retention-days: 1
        archive: false
    

    - name: Set up JDK 21
      if: matrix.platform == 'android'
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission to gradlew
      if: matrix.platform == 'android'
      run: chmod +x gradlew

    - name: Build with Gradle
      if: matrix.platform == 'android'
      run: ./gradlew assembleRelease

    - name: Rename APK
      if: matrix.platform == 'android'
      run: |
        SHORT_HASH=$(git rev-parse --short HEAD)
        for apk in app/build/outputs/apk/release/*.apk; do
          if [ -f "$apk" ]; then
            mv "$apk" "${apk%.apk}-${SHORT_HASH}.apk"
          fi
        done

    - name: Upload Universal APK
      if: matrix.platform == 'android'
      uses: actions/upload-artifact@v7
      with:
        path: app/build/outputs/apk/release/*-universal-*.apk
        archive: false
        retention-days: 1

    - name: Upload arm64-v8a APK
      if: matrix.platform == 'android'
      uses: actions/upload-artifact@v7
      with:
        path: app/build/outputs/apk/release/*-arm64-v8a-*.apk
        archive: false
        retention-days: 1

    - name: Upload armeabi-v7a APK
      if: matrix.platform == 'android'
      uses: actions/upload-artifact@v7
      with:
        path: app/build/outputs/apk/release/*-armeabi-v7a-*.apk
        archive: false
        retention-days: 1

    - name: Grant execute permission to build script
      if: matrix.platform == 'linux'
      run: chmod +x build-linux.sh

    - name: Build for Linux
      if: matrix.platform == 'linux'
      run: sudo DEBIAN_FRONTEND=noninteractive ./build-linux.sh -y

    - name: Upload Linux Build Artifact
      if: matrix.platform == 'linux'
      uses: actions/upload-artifact@v7
      with:
        name: Release-Linux-x64
        path: |
          build/CasioEmuMsvc/CasioEmuMsvc
          build/CasioEmuMsvc/crashpad_handler
          build/CasioEmuMsvc/locales/
          build/CasioEmuMsvc/roms.db
        if-no-files-found: error
        retention-days: 1
    
    - name: Setup certficate for iOS build
      if: matrix.platform == 'ios'
      run: |
        security create-keychain -p "" build.keychain
        security unlock-keychain -p "" build.keychain
    
        security set-keychain-settings -lut 21600 build.keychain
        security list-keychains -d user -s build.keychain
        security default-keychain -s build.keychain
    
        security import iOSresources/export_anar.p12 \
          -k build.keychain \
          -P "1234" \
          -A \
          -T /usr/bin/codesign
    
        security set-key-partition-list \
          -S apple-tool:,apple: \
          -s \
          -k "" \
          build.keychain
        
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        cp iOSresources/export_anar.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
    
    - name: Build for iOS
      if: matrix.platform == 'ios'
      run: |
        
        cmake -S . -B build -G Ninja -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
          -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=YES \
          -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_REQUIRED=YES \
          -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGN_IDENTITY="Apple Distribution" \
          -DCMAKE_XCODE_ATTRIBUTE_DEVELOPMENT_TEAM="4Z7V3V3G9R" \
          -DCMAKE_CXX_STANDARD=20
        
        cmake --build build --config Release 
    - name: Create .ipa
      if: matrix.platform == 'ios'
      run: |
        set -e

        mkdir -p build/Payload
        
        APP=$(find build -type d -name "*.app" | head -n 1)
        
        echo "Found app: $APP"
        
        rm -rf build/Payload/*
        cp -R "$APP" build/Payload/
        
        cd build
        zip -r CasioEmuMsvc.ipa Payload
        
        cd ..
        
    - name: upload build ios
      if: always() && matrix.platform == 'ios'
      uses: actions/upload-artifact@v7
      with:
        path: build/CasioEmuMsvc.ipa
        retention-days: 1
        archive: false
    - name: upload build failed ios
      if: failure() && matrix.platform == 'ios'
      uses: actions/upload-artifact@v7
      with:
        path: build/CasioEmuMsvc.ipa
        retention-days: 1
        archive: false
    
    - name: Dump CMake error
      if: failure()
      shell: bash
      run: |
        find . -name "CMakeError.log" -exec cat {} \;
        find . -name "CMakeOutput.log" -exec cat {} \;

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/stable'

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Download All Artifacts
      uses: actions/download-artifact@v8
      with:
        path: ./artifacts
        skip-decompress: true
        merge-multiple: true

    - name: Generate Release Details
      id: release_details
      run: |
        SHORT_HASH=$(git rev-parse --short HEAD)
        echo "COMMIT_HASH=$SHORT_HASH" >> $GITHUB_ENV
        echo "RELEASE_TAG=stable-$(date +'%Y%m%d%H%M%S')-$SHORT_HASH" >> $GITHUB_ENV
        echo "RELEASE_DATE=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV
        
        CHANGELOG_CONTENT=$(git log -5 --pretty=format:"- %s (%h)" --abbrev-commit)
        echo "CHANGELOG<<EOF" >> $GITHUB_ENV
        echo "$CHANGELOG_CONTENT" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    - name: Prepare Release Assets
      run: |
        mkdir -p release_assets
        if ls ./artifacts/*.apk 1> /dev/null 2>&1; then
          cp ./artifacts/*.apk release_assets/
        fi

        if [ -f "./artifacts/Release-x86.zip" ]; then
          mv "./artifacts/Release-x86.zip" "./release_assets/windows-x86-${{ env.COMMIT_HASH }}.zip"
        fi
        
        if [ -f "./artifacts/Release-x64.zip" ]; then
          mv "./artifacts/Release-x64.zip" "./release_assets/windows-x64-${{ env.COMMIT_HASH }}.zip"
        fi
        
        if [ -f "./artifacts/Release-Linux-x64.zip" ]; then
          mv "./artifacts/Release-Linux-x64.zip" "./release_assets/linux-x64-${{ env.COMMIT_HASH }}.zip"
        fi
        
        if [ -f "./artifacts/CasioEmuMsvc.dmg" ]; then
          mv "./artifacts/CasioEmuMsvc.dmg" "./release_assets/macOS-universal-${{ env.COMMIT_HASH }}.dmg"
        fi
        
        if [ -f "./artifacts/CasioEmuMsvc.ipa" ]; then
          mv "./artifacts/CasioEmuMsvc.ipa" "./release_assets/iOS-build-${{ env.COMMIT_HASH }}.ipa"
        fi
        
        echo "=== ARTIFACTS ==="
        ls -R ./artifacts
        
        echo "=== IPA SEARCH ==="
        find ./artifacts -name "*.ipa"
        
        echo "=== DMG SEARCH ==="
        find ./artifacts -name "*.dmg"
        
        ls -la release_assets/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        name: '🚧 Auto Build ${{ env.RELEASE_TAG }} (Pre-release)'
        body: |
          ## ⚠️ Pre-release Auto Build
          
          > **Warning**: This is an automated pre-release build for testing purposes. 
          > It may contain bugs and is not recommended for production use.
          
          **Build Date:** ${{ env.RELEASE_DATE }}
          **Commit:** [${{ env.COMMIT_HASH }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
          
          ### Recent Changes
          ${{ env.CHANGELOG }}
          
          ### Notes
          - This is an automated build from the latest commit on the stable branch
          - Use at your own risk - this is a development build
        files: release_assets/*
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}