<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CasioEmu Web</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101214;
      --panel: #181b1e;
      --panel-2: #20252a;
      --line: #343a40;
      --text: #edf2f4;
      --muted: #9ba6ad;
      --accent: #21a6a1;
      --accent-2: #d9a441;
      --danger: #d95f59;
      --ok: #68b36b;
      --shadow: rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
    }

    aside {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;
      padding: 16px;
      background: var(--panel);
      border-right: 1px solid var(--line);
      box-shadow: 12px 0 30px var(--shadow);
      z-index: 2;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 34px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .mark {
      width: 24px;
      height: 24px;
      border: 2px solid var(--accent);
      border-radius: 4px;
      display: grid;
      place-items: center;
      color: var(--accent);
      font-size: 13px;
      line-height: 1;
    }

    .controls,
    .status,
    .files {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--text);
      font: inherit;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover:not(:disabled) {
      border-color: var(--accent);
    }

    button:disabled {
      cursor: not-allowed;
      color: #6f787e;
      background: #171a1d;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #061112;
      font-weight: 700;
    }

    button.warn {
      border-color: #7b6530;
      color: #f1d58c;
    }

    button.danger {
      border-color: #7c3936;
      color: #f0aba7;
    }

    .status-line {
      min-height: 34px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #121518;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .status-line.success {
      color: var(--ok);
      border-color: #3c6840;
    }

    .status-line.error {
      color: #f0aba7;
      border-color: #7c3936;
    }

    .status-line.info {
      color: var(--accent-2);
      border-color: #75602e;
    }

    .file-name {
      min-height: 28px;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    main {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr);
      background: #0b0d0f;
    }

    .stage {
      min-width: 0;
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .canvas-wrap {
      width: 100%;
      height: 100%;
      min-height: 240px;
      border: 1px solid #252b30;
      border-radius: 6px;
      background: #14171a;
      overflow: hidden;
      display: grid;
      place-items: center;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      outline: none;
      background: #111;
    }

    input[type="file"] {
      display: none;
    }

    @media (max-width: 780px) {
      body {
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(0, 1fr);
      }

      aside {
        border-right: 0;
        border-bottom: 1px solid var(--line);
        box-shadow: 0 10px 24px var(--shadow);
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .status,
      .files {
        display: grid;
        grid-template-columns: 1fr;
      }

      .stage {
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <aside>
    <div class="brand"><span class="mark">CE</span><span>CasioEmu Web</span></div>

    <div class="files">
      <button id="pickFolder" class="primary">Load Folder</button>
      <button id="pickFiles">Load Files</button>
      <div id="fileName" class="file-name">No model loaded</div>
    </div>

    <div class="controls">
      <button id="startBtn" disabled>Start</button>
      <div class="row">
        <button id="pauseBtn" disabled>Pause</button>
        <button id="resetBtn" disabled>Reset</button>
      </div>
      <div class="row">
        <button id="syncBtn" disabled>Save</button>
        <button id="stopBtn" class="danger" disabled>Stop</button>
      </div>
    </div>

    <div class="status">
      <div id="status" class="status-line">Loading runtime</div>
    </div>
  </aside>

  <main>
    <section class="stage" id="stage">
      <div class="canvas-wrap">
        <canvas id="canvas" tabindex="0"></canvas>
      </div>
    </section>
  </main>

  <input id="folderInput" type="file" webkitdirectory directory multiple>
  <input id="fileInput" type="file" multiple>

  <script>
    const statusEl = document.getElementById("status");
    const fileNameEl = document.getElementById("fileName");
    const canvas = document.getElementById("canvas");
    const stage = document.getElementById("stage");

    const buttons = {
      pickFolder: document.getElementById("pickFolder"),
      pickFiles: document.getElementById("pickFiles"),
      start: document.getElementById("startBtn"),
      pause: document.getElementById("pauseBtn"),
      reset: document.getElementById("resetBtn"),
      sync: document.getElementById("syncBtn"),
      stop: document.getElementById("stopBtn")
    };

    let runtimeReady = false;
    let modelReady = false;
    let running = false;
    let paused = false;

    function setStatus(text, level = "") {
      statusEl.textContent = text;
      statusEl.className = "status-line" + (level ? " " + level : "");
    }

    function setRunningState(isRunning) {
      running = isRunning;
      buttons.start.disabled = !runtimeReady || !modelReady || running;
      buttons.pause.disabled = !running;
      buttons.reset.disabled = !running;
      buttons.sync.disabled = !runtimeReady || !modelReady;
      buttons.stop.disabled = !running;
      buttons.pause.textContent = paused ? "Resume" : "Pause";
    }

    function ensureDir(path) {
      const parts = path.split("/").filter(Boolean);
      let current = "";
      for (const part of parts) {
        current += "/" + part;
        if (!Module.FS.analyzePath(current).exists) {
          Module.FS.mkdir(current);
        }
      }
    }

    function removeTree(path) {
      if (!Module.FS.analyzePath(path).exists) {
        return;
      }
      for (const entry of Module.FS.readdir(path)) {
        if (entry === "." || entry === "..") {
          continue;
        }
        const child = path + "/" + entry;
        const stat = Module.FS.stat(child);
        if (Module.FS.isDir(stat.mode)) {
          removeTree(child);
        } else {
          Module.FS.unlink(child);
        }
      }
      Module.FS.rmdir(path);
    }

    function syncfs(populate) {
      return new Promise((resolve, reject) => {
        Module.FS.syncfs(populate, err => err ? reject(err) : resolve());
      });
    }

    function relativePaths(files) {
      const raw = files.map(file => file.webkitRelativePath || file.name);
      const roots = new Set(raw.filter(path => path.includes("/")).map(path => path.split("/")[0]));
      const stripRoot = roots.size === 1;
      return raw.map(path => {
        const parts = path.split("/").filter(Boolean);
        return stripRoot && parts.length > 1 ? parts.slice(1).join("/") : parts.join("/");
      });
    }

    async function loadFiles(fileList) {
      const files = Array.from(fileList || []);
      if (!files.length || !runtimeReady) {
        return;
      }

      setStatus("Loading files", "info");
      await syncfs(true);
      removeTree("/models/current");
      ensureDir("/models/current");

      const paths = relativePaths(files);
      for (let i = 0; i < files.length; i++) {
        const rel = paths[i];
        const target = "/models/current/" + rel;
        const slash = target.lastIndexOf("/");
        if (slash > 0) {
          ensureDir(target.slice(0, slash));
        }
        const bytes = new Uint8Array(await files[i].arrayBuffer());
        Module.FS.writeFile(target, bytes);
      }

      await syncfs(false);
      modelReady = true;
      paused = false;
      fileNameEl.textContent = files[0].webkitRelativePath ? files[0].webkitRelativePath.split("/")[0] : files[0].name;
      setStatus("Model files loaded", "success");
      setRunningState(false);
    }

    function resizeRuntime() {
      if (!runtimeReady || !running) {
        return;
      }
      const rect = stage.getBoundingClientRect();
      const width = Math.max(320, Math.floor(rect.width - 36));
      const height = Math.max(240, Math.floor(rect.height - 36));
      Module.ccall("casioemu_web_resize", null, ["number", "number"], [width, height]);
    }

    function startModel() {
      if (!runtimeReady || !modelReady || running) {
        return;
      }
      const rc = Module.ccall("casioemu_web_start", "number", ["string"], ["/models/current"]);
      if (rc === 0) {
        paused = false;
        setRunningState(true);
        resizeRuntime();
        canvas.focus();
      }
    }

    var Module = {
      canvas,
      print(text) {
        console.log(text);
      },
      printErr(text) {
        console.error(text);
      },
      setStatus(text) {
        if (text) {
          setStatus(text, "info");
        }
      },
      onRuntimeInitialized() {
        runtimeReady = true;
        buttons.pickFolder.disabled = false;
        buttons.pickFiles.disabled = false;
        setRunningState(false);
      },
      casioemuStatus(message, level) {
        setStatus(message, level || "");
      },
      casioemuDidMount(hasError, message) {
        if (hasError) {
          setStatus(message || "Persistent storage failed", "error");
        } else {
          setStatus("Runtime ready", "success");
        }
      },
      casioemuSyncStarted() {
        setStatus("Saving", "info");
      },
      casioemuSyncFinished(hasError, message) {
        if (hasError) {
          setStatus(message || "Save failed", "error");
        } else {
          setStatus("Saved", "success");
        }
      }
    };
  </script>

  {{{ SCRIPT }}}

  <script>
    document.getElementById("folderInput").addEventListener("change", event => loadFiles(event.target.files));
    document.getElementById("fileInput").addEventListener("change", event => loadFiles(event.target.files));

    buttons.pickFolder.addEventListener("click", () => document.getElementById("folderInput").click());
    buttons.pickFiles.addEventListener("click", () => document.getElementById("fileInput").click());
    buttons.start.addEventListener("click", startModel);
    buttons.pause.addEventListener("click", () => {
      if (!running) return;
      paused = !paused;
      Module.ccall("casioemu_web_pause", null, ["number"], [paused ? 1 : 0]);
      setRunningState(true);
      canvas.focus();
    });
    buttons.reset.addEventListener("click", () => {
      if (running) {
        Module.ccall("casioemu_web_reset", null, [], []);
        canvas.focus();
      }
    });
    buttons.sync.addEventListener("click", () => {
      if (runtimeReady) {
        Module.ccall("casioemu_web_syncfs", null, [], []);
      }
    });
    buttons.stop.addEventListener("click", () => {
      if (running) {
        Module.ccall("casioemu_web_stop", null, [], []);
        paused = false;
        setRunningState(false);
      }
    });

    window.addEventListener("resize", resizeRuntime);
    canvas.addEventListener("click", () => canvas.focus());
    buttons.pickFolder.disabled = true;
    buttons.pickFiles.disabled = true;
  </script>
</body>
</html>
